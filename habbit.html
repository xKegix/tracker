<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Habits</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --text-1: #FAFAFA;
  --text-2: rgba(255,255,255,0.55);
  --text-3: rgba(255,255,255,0.28);
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 55% 45% at 15% 25%, rgba(245,158,11,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 65%, rgba(167,139,250,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 50% 90%, rgba(52,211,153,0.05) 0%, transparent 65%);
  pointer-events: none;
}

.shell {
  max-width: 560px; margin: 0 auto;
  padding: 28px max(16px, env(safe-area-inset-right)) max(60px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}

.page-header { margin-bottom: 28px; }
.page-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.26em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 6px;
}
.page-title {
  font-size: 30px; font-weight: 800; letter-spacing: -0.025em; color: var(--text-1);
}

.habits-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Habit card ── */
.hcard {
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  padding: 22px 20px 18px;
  transition: border-color 0.45s ease, box-shadow 0.45s ease;
  position: relative;
  overflow: hidden;
}
.hcard.done {
  border-color: var(--hc-dim);
  box-shadow: 0 0 0 1px var(--hc-dim), 0 10px 40px var(--hc-glow);
}
/* subtle shimmer layer revealed on completion */
.hcard::after {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, var(--hc-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.hcard.done::after { opacity: 1; }

/* all children sit above the shimmer */
.hcard > * { position: relative; z-index: 1; }

/* ── Card header ── */
.hcard-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.hcard-icon { font-size: 22px; line-height: 1; }
.hcard-name {
  font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--hc);
}

/* ── 7-day dot row ── */
.hcard-week {
  display: flex; justify-content: space-between;
  margin-bottom: 18px;
}
.hday {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  flex: 1;
}
.hday-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-3);
}
.hday.today .hday-lbl { color: var(--text-2); }
.hday-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transition: background 0.3s, box-shadow 0.3s;
}
.hday.done .hday-dot {
  background: var(--hc);
  box-shadow: 0 0 6px var(--hc-dim);
}

/* ── Streak block ── */
.hcard-streak {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px;
}
.hcard-streak-num {
  font-size: 68px; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
  color: var(--hc); font-variant-numeric: tabular-nums;
}
.hcard-streak-num.pop { animation: streak-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
@keyframes streak-pop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.30); }
  100% { transform: scale(1); }
}
.hcard-streak-meta {
  display: flex; flex-direction: column; gap: 3px; padding-bottom: 8px;
}
.hcard-streak-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--text-3);
}
.hcard-streak-best {
  font-size: 11px; color: var(--text-3); font-family: var(--font-mono);
}

/* ── Mark-complete button ── */
.hcard-btn {
  width: 100%; padding: 13px 16px;
  border-radius: 12px;
  border: 1px solid var(--hc-dim);
  background: var(--hc-bg);
  color: var(--hc);
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s, transform 0.1s, opacity 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.hcard-btn.idle:hover  { background: var(--hc-bg-h); }
.hcard-btn.idle:active { transform: scale(0.97); }
.hcard-btn.completed   { opacity: 0.68; cursor: default; background: var(--hc-bg-h); }

/* ── Checkmark entry animation ── */
.check-anim {
  display: inline-block;
  animation: check-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes check-pop {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg);  opacity: 1; }
}

/* ── Global FX (fixed-position, appended to body) ── */
.fx-particle {
  position: fixed;
  width: 7px; height: 7px;
  border-radius: 50%;
  pointer-events: none; z-index: 9999;
  animation: fx-p 0.65s ease-out both;
}
@keyframes fx-p {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0.1); opacity: 0; }
}

.fx-ring {
  position: fixed;
  border-radius: 50%;
  border: 2px solid var(--rc);
  pointer-events: none; z-index: 9998;
  animation: fx-ring 0.7s ease-out both;
}
@keyframes fx-ring {
  0%   { width: 10px; height: 10px; opacity: 0.85; transform: translate(-50%,-50%) scale(1); }
  100% { width: 320px; height: 320px; opacity: 0;   transform: translate(-50%,-50%) scale(1); }
}

/* ── All-done celebration banner ── */
.fx-banner {
  position: fixed; inset: 0 0 auto 0; z-index: 10000;
  text-align: center;
  padding: max(env(safe-area-inset-top), 68px) 24px 18px;
  background: linear-gradient(180deg, rgba(245,158,11,0.94) 0%, rgba(245,158,11,0) 100%);
  color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  pointer-events: none;
  animation: fx-banner 3s ease-out both;
}
@keyframes fx-banner {
  0%   { opacity: 0; transform: translateY(-10px); }
  12%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .shell { padding-top: 20px; }
  .page-title { font-size: 26px; }
  .hcard { padding: 18px 16px 16px; }
  .hcard-streak-num { font-size: 56px; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="page-header">
    <p class="page-eyebrow">Daily</p>
    <h1 class="page-title">Habits</h1>
  </div>
  <div class="habits-list" id="habitsList"></div>
</div>

<script>
(function () {
  'use strict';

  const HABITS = [
    {
      id: 'nofap',  label: 'Nofap',  icon: '🔥',
      color: '#F59E0B',
      dimColor:  'rgba(245,158,11,0.32)',
      bgColor:   'rgba(245,158,11,0.07)',
      bgHover:   'rgba(245,158,11,0.14)',
      glowColor: 'rgba(245,158,11,0.13)',
    },
    {
      id: 'rosary', label: 'Rosary', icon: '📿',
      color: '#A78BFA',
      dimColor:  'rgba(167,139,250,0.32)',
      bgColor:   'rgba(167,139,250,0.07)',
      bgHover:   'rgba(167,139,250,0.14)',
      glowColor: 'rgba(167,139,250,0.13)',
    },
    {
      id: 'bible',  label: 'Bible',  icon: '📖',
      color: '#34D399',
      dimColor:  'rgba(52,211,153,0.32)',
      bgColor:   'rgba(52,211,153,0.07)',
      bgHover:   'rgba(52,211,153,0.14)',
      glowColor: 'rgba(52,211,153,0.13)',
    },
  ];

  const DAY_LABELS = ['S','M','T','W','T','F','S'];

  // ── Date helpers ──────────────────────────────────────────────
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function keyOf(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function last7() {
    const keys = [];
    const d = new Date();
    for (let i = 6; i >= 0; i--) {
      const dd = new Date(d); dd.setDate(d.getDate() - i);
      keys.push({ key: keyOf(dd), dow: dd.getDay() });
    }
    return keys;
  }

  // ── Storage ───────────────────────────────────────────────────
  function load() {
    try { return JSON.parse(localStorage.getItem('habits_v1')) || {}; } catch (e) { return {}; }
  }
  function save(s) { localStorage.setItem('habits_v1', JSON.stringify(s)); }
  function getH(state, id) { return Object.assign({ dates: {}, longest: 0 }, state[id] || {}); }

  function computeStreak(dates) {
    const today = todayKey();
    const d = new Date();
    if (!dates[today]) d.setDate(d.getDate() - 1);
    let n = 0;
    while (dates[keyOf(d)]) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }

  function markDone(id) {
    const state = load();
    const h = getH(state, id);
    h.dates[todayKey()] = true;
    const streak = computeStreak(h.dates);
    h.longest = Math.max(h.longest || 0, streak);
    state[id] = h;
    save(state);
    return state;
  }

  // ── Visual FX ─────────────────────────────────────────────────
  function burst(cx, cy, color) {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('span');
      p.className = 'fx-particle';
      const angle = (i / 18) * Math.PI * 2 + (Math.random() - 0.5) * 0.35;
      const dist  = 55 + Math.random() * 85;
      p.style.cssText =
        'left:' + (cx - 3.5) + 'px;top:' + (cy - 3.5) + 'px;background:' + color + ';' +
        '--dx:' + (Math.cos(angle) * dist) + 'px;' +
        '--dy:' + (Math.sin(angle) * dist) + 'px;' +
        'animation-delay:' + (Math.random() * 60) + 'ms';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 900);
    }
  }

  function ring(cx, cy, color) {
    const r = document.createElement('div');
    r.className = 'fx-ring';
    r.style.cssText = 'left:' + cx + 'px;top:' + cy + 'px;';
    r.style.setProperty('--rc', color);
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 800);
  }

  function allDoneBanner() {
    const b = document.createElement('div');
    b.className = 'fx-banner';
    b.textContent = '✦  All habits complete today  ✦';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 3100);
  }

  // ── Card builder ──────────────────────────────────────────────
  let _skipRender = false;

  function makeCard(habit, state) {
    const h      = getH(state, habit.id);
    const done   = !!h.dates[todayKey()];
    const streak = computeStreak(h.dates);
    const best   = Math.max(h.longest || 0, streak);
    const week   = last7();

    const card = document.createElement('div');
    card.className = 'hcard' + (done ? ' done' : '');
    card.id = 'hcard-' + habit.id;
    card.style.setProperty('--hc',      habit.color);
    card.style.setProperty('--hc-dim',  habit.dimColor);
    card.style.setProperty('--hc-bg',   habit.bgColor);
    card.style.setProperty('--hc-bg-h', habit.bgHover);
    card.style.setProperty('--hc-glow', habit.glowColor);

    // Build 7-day dot HTML
    const today = todayKey();
    const weekHTML = week.map(({ key, dow }) => {
      const dayDone = !!h.dates[key];
      const isToday = key === today;
      return `<div class="hday${dayDone ? ' done' : ''}${isToday ? ' today' : ''}">` +
        `<span class="hday-lbl">${DAY_LABELS[dow]}</span>` +
        `<span class="hday-dot"></span>` +
        `</div>`;
    }).join('');

    card.innerHTML =
      `<div class="hcard-head">` +
        `<span class="hcard-icon">${habit.icon}</span>` +
        `<span class="hcard-name">${habit.label}</span>` +
      `</div>` +
      `<div class="hcard-week">${weekHTML}</div>` +
      `<div class="hcard-streak">` +
        `<div class="hcard-streak-num" id="snum-${habit.id}">${streak}</div>` +
        `<div class="hcard-streak-meta">` +
          `<div class="hcard-streak-label" id="slbl-${habit.id}">Day${streak !== 1 ? 's' : ''} Streak</div>` +
          `<div class="hcard-streak-best" id="sbest-${habit.id}">Best: ${best}d</div>` +
        `</div>` +
      `</div>` +
      `<button class="hcard-btn ${done ? 'completed' : 'idle'}" id="hbtn-${habit.id}"` +
        (done ? ' disabled' : '') + `>` +
        (done ? `<span class="check-anim">✓</span> Completed Today` : `Mark Complete`) +
      `</button>`;

    if (!done) {
      card.querySelector('#hbtn-' + habit.id).addEventListener('click', function onMark() {
        // Prevent re-render from killing animations
        _skipRender = true;
        setTimeout(() => { _skipRender = false; }, 1400);

        const newState = markDone(habit.id);

        // FX — fire from card center
        const rc = card.getBoundingClientRect();
        const cx = rc.left + rc.width  / 2;
        const cy = rc.top  + rc.height / 2;
        burst(cx, cy, habit.color);
        ring(cx, cy, habit.color);

        // Card done state + shimmer
        card.classList.add('done');

        // Animate streak number
        const newH      = getH(newState, habit.id);
        const newStreak = computeStreak(newH.dates);
        const newBest   = Math.max(newH.longest || 0, newStreak);
        const numEl  = document.getElementById('snum-'  + habit.id);
        const lblEl  = document.getElementById('slbl-'  + habit.id);
        const bestEl = document.getElementById('sbest-' + habit.id);
        numEl.textContent = newStreak;
        lblEl.textContent = 'Day' + (newStreak !== 1 ? 's' : '') + ' Streak';
        if (bestEl) bestEl.textContent = 'Best: ' + newBest + 'd';
        numEl.classList.remove('pop');
        void numEl.offsetWidth; // force reflow
        numEl.classList.add('pop');
        setTimeout(() => numEl.classList.remove('pop'), 500);

        // Light up today's dot
        const todayDot = card.querySelectorAll('.hday.today .hday-dot');
        todayDot.forEach(d => { d.closest('.hday').classList.add('done'); });

        // Swap button to done state
        const btn = document.getElementById('hbtn-' + habit.id);
        btn.className = 'hcard-btn completed';
        btn.innerHTML = '<span class="check-anim">✓</span> Completed Today';
        btn.disabled = true;
        btn.removeEventListener('click', onMark);

        // Update topbar count
        window.dispatchEvent(new Event('storage'));

        // Check all done
        const s = load();
        const allDone = HABITS.every(hab => !!getH(s, hab.id).dates[todayKey()]);
        if (allDone) setTimeout(allDoneBanner, 350);
      });
    }

    return card;
  }

  function renderAll() {
    if (_skipRender) return;
    const list = document.getElementById('habitsList');
    if (!list) return;
    const state = load();
    list.innerHTML = '';
    HABITS.forEach(h => list.appendChild(makeCard(h, state)));
  }

  renderAll();

  // Re-render when sync pushes remote data
  window.addEventListener('storage', renderAll);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) renderAll(); });
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'habits',
    syncedKeys: ['habits_v1'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>
</body>
</html>
